<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSense | Smart Soil Analysis</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="main-container">
        <div class="card">
            <header class="card-header">
                <h1>AgroSense</h1>
                <p>Fertilizer & Crop Recommendation System</p>
            </header>

            <form method="post" class="analysis-form">
                <div class="form-grid">
                    <!-- Environmental Section -->
                    <div class="form-group">
                        <label>Temperature (°C)</label>
                        <input type="number" step="0.1" name="temperature" placeholder="25.5" required>
                    </div>
                    <div class="form-group">
                        <label>Humidity (%)</label>
                        <input type="number" step="0.1" name="humidity" placeholder="50.0" required>
                    </div>
                    <div class="form-group">
                        <label>Moisture</label>
                        <input type="number" step="0.1" name="soil_moisture" placeholder="30.0" required>
                    </div>

                    <!-- Soil Section -->
                    <div class="form-group full-width">
                        <label>Soil Type</label>
                        <div class="select-wrapper">
                            <select name="soil_type" required>
                                <option value="" disabled selected>Select Soil Type</option>
                                <option value="clayey">Clayey</option>
                                <option value="loamy">Loamy</option>
                                <option value="sandy">Sandy</option>
                                <option value="black">Black</option>
                                <option value="red">Red</option>
                            </select>
                        </div>
                    </div>

                    <!-- Chemical Section -->
                    <div class="form-group">
                        <label>Nitrogen (N)</label>
                        <input type="number" step="1" name="nitrogen" placeholder="0-200" required>
                    </div>
                    <div class="form-group">
                        <label>Potassium (K)</label>
                        <input type="number" step="1" name="potassium" placeholder="0-200" required>
                    </div>
                    <div class="form-group">
                        <label>Phosphorous (P)</label>
                        <input type="number" step="1" name="phosphorous" placeholder="0-200" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Analyze Soil</button>
                </div>
            </form>

            <!-- Results Section -->
            {% if crop %}
            <div class="results-container">
                <div class="result-box crop-box">
                    <span class="result-label">Recommended Crop</span>
                    <span class="result-value">{{ crop }}</span>
                </div>
                <div class="result-box fertilizer-box">
                    <span class="result-label">Recommended Fertilizer</span>
                    <span class="result-value">{{ fertilizer }}</span>
                </div>
            </div>
            {% endif %}

            <!-- Error Section -->
            {% if error %}
            <div class="error-container">
                <p>Error: {{ error }}</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
